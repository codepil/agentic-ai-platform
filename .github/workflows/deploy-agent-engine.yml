name: Deploy agent-engine

on:
  push:
    branches: [main]
    paths:
      - 'agent-engine/**'
      - '.github/workflows/deploy-agent-engine.yml'

permissions:
  id-token: write   # Required for OIDC token exchange with AWS
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: agent-engine
  ECS_CLUSTER: agentic-ai-cluster
  ECS_SERVICE: agent-engine-service
  CONTAINER_NAME: agent-engine

jobs:
  test:
    name: Run unit tests (MOCK_MODE)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        working-directory: agent-engine
        run: pip install -r requirements.txt

      - name: Run tests in MOCK_MODE (no real LLM or API calls)
        working-directory: agent-engine
        env:
          MOCK_MODE: "true"
        run: pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-agent-engine
          path: agent-engine/test-results.xml

  build-and-deploy:
    name: Build, push, deploy
    runs-on: ubuntu-latest
    needs: test   # Only deploy if all 84 tests pass
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # IAM role created by Terraform (modules/ecs) — assumes via GitHub OIDC, no long-lived keys
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag (SHA + date — never use latest)
        id: image-tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date +%Y%m%d)
          echo "tag=${SHORT_SHA}-${DATE}" >> $GITHUB_OUTPUT
          echo "full_image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${SHORT_SHA}-${DATE}" >> $GITHUB_OUTPUT

      - name: Build, tag, push Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ steps.image-tag.outputs.tag }}
        working-directory: agent-engine
        run: |
          docker build \
            --label "git-sha=${{ github.sha }}" \
            --label "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t $REGISTRY/${{ env.ECR_REPOSITORY }}:$TAG \
            .
          docker push $REGISTRY/${{ env.ECR_REPOSITORY }}:$TAG
          echo "Pushed: $REGISTRY/${{ env.ECR_REPOSITORY }}:$TAG"

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition agent-engine \
            --query taskDefinition \
            > task-definition.json

      - name: Render new task definition with updated image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.image-tag.outputs.full_image }}

      - name: Deploy to ECS (rolling update, wait for stability)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          # agent-engine has no ALB — ECS waits for tasks to reach RUNNING state.
          # If tasks crash (unhealthy) within the deployment circuit-breaker window,
          # ECS rolls back to the previous task definition revision automatically.
          wait-for-service-stability: true

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":white_check_mark: *agent-engine* deployed successfully\n*SHA:* ${{ github.sha }}\n*Image:* `${{ steps.image-tag.outputs.tag }}`\n*Actor:* ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":x: *agent-engine* deploy FAILED\n*SHA:* ${{ github.sha }}\n*Actor:* ${{ github.actor }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
