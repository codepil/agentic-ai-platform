name: Deploy platform-app

on:
  push:
    branches: [main]
    paths:
      - 'platform-core/**'
      - '.github/workflows/deploy-platform-app.yml'

permissions:
  id-token: write   # Required for OIDC token exchange with AWS
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: platform-app
  ECS_CLUSTER: agentic-ai-cluster
  ECS_SERVICE: platform-app-service
  CONTAINER_NAME: platform-app

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: platform-core
        run: mvn test --batch-mode --no-transfer-progress

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-platform-app
          path: platform-core/platform-app/target/surefire-reports/

  build-and-deploy:
    name: Build, push, deploy
    runs-on: ubuntu-latest
    needs: test   # Only deploy if tests pass
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # IAM role created by Terraform (modules/ecs) — assumes via GitHub OIDC, no long-lived keys
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag (SHA + date — never use latest)
        id: image-tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date +%Y%m%d)
          echo "tag=${SHORT_SHA}-${DATE}" >> $GITHUB_OUTPUT
          echo "full_image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${SHORT_SHA}-${DATE}" >> $GITHUB_OUTPUT

      - name: Set up Java 25 for Maven build
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build fat JAR (skip tests — already ran in test job)
        working-directory: platform-core
        run: mvn package -DskipTests --batch-mode --no-transfer-progress

      - name: Build, tag, push Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ steps.image-tag.outputs.tag }}
        working-directory: platform-core/platform-app
        run: |
          docker build \
            --label "git-sha=${{ github.sha }}" \
            --label "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t $REGISTRY/${{ env.ECR_REPOSITORY }}:$TAG \
            .
          docker push $REGISTRY/${{ env.ECR_REPOSITORY }}:$TAG
          echo "Pushed: $REGISTRY/${{ env.ECR_REPOSITORY }}:$TAG"

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition platform-app \
            --query taskDefinition \
            > task-definition.json

      - name: Render new task definition with updated image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.image-tag.outputs.full_image }}

      - name: Deploy to ECS (rolling update, wait for stability)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          # Waits up to 10 minutes for the new tasks to become healthy.
          # If stability is not reached, the step fails and ECS rolls back
          # automatically to the previous task definition revision.
          wait-for-service-stability: true

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":white_check_mark: *platform-app* deployed successfully\n*SHA:* ${{ github.sha }}\n*Image:* `${{ steps.image-tag.outputs.tag }}`\n*Actor:* ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":x: *platform-app* deploy FAILED\n*SHA:* ${{ github.sha }}\n*Actor:* ${{ github.actor }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
